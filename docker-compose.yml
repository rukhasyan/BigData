version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: iot_user
      POSTGRES_PASSWORD: iot_password
      POSTGRES_DB: iot_db
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/init/ddl.sql:/docker-entrypoint-initdb.d/01-ddl.sql
      - ./postgres/init/dml.sql:/docker-entrypoint-initdb.d/02-dml.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iot_user"]
      interval: 5s
      timeout: 5s
      retries: 5

  flink-jobmanager:
    image: flink:1.18-java11
    ports:
      - "8081:8081"
    environment:
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager
      - FLINK_PROPERTIES=jobmanager.rpc.address:flink-jobmanager
    volumes:
      - ./jars:/opt/flink/userjars
      - ./flink-conf.yaml:/opt/flink/conf/flink-conf.yaml
    command: bash -c "cp /opt/flink/userjars/*.jar /opt/flink/lib/ 2>/dev/null; /docker-entrypoint.sh jobmanager"

  flink-taskmanager:
    image: flink:1.18-java11
    depends_on:
      - flink-jobmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager
    volumes:
      - ./jars:/opt/flink/userjars
      - ./flink-conf.yaml:/opt/flink/conf/flink-conf.yaml
    command: bash -c "cp /opt/flink/userjars/*.jar /opt/flink/lib/ 2>/dev/null; /docker-entrypoint.sh taskmanager"

  iot-generator:
    build:
      context: ./iot-generator
      dockerfile: Dockerfile
    depends_on:
      kafka:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:29092
      KAFKA_TOPIC: iot-events
    networks:
      - default

volumes:
  postgres_data:

networks:
  default:
    driver: bridge